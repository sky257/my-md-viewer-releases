name: 릴리스 게시

on:
  push:
    branches:
      - release-staging

permissions:
  contents: write

concurrency:
  group: public-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 배포 파일 체크아웃
        uses: actions/checkout@v6

      - name: 릴리스 정보 확인
        id: release
        shell: bash
        run: |
          tag="$(tr -d '\r\n' < release-artifacts/TAG.txt)"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "잘못된 릴리스 태그: $tag" >&2
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "이미 게시된 릴리스입니다: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: GitHub Release 게시
        shell: bash
        run: |
          mapfile -t assets < <(
            find release-artifacts -maxdepth 1 -type f \
              ! -name "TAG.txt" \
              ! -name "RELEASE_NOTES.md" \
              -print
          )
          gh release create "${{ steps.release.outputs.tag }}" \
            "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "My MD Viewer ${{ steps.release.outputs.tag }}" \
            --notes-file release-artifacts/RELEASE_NOTES.md \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 임시 배포 브랜치 삭제
        if: ${{ success() }}
        shell: bash
        run: |
          gh api \
            --method DELETE \
            "repos/$GITHUB_REPOSITORY/git/refs/heads/release-staging"
        env:
          GH_TOKEN: ${{ github.token }}
